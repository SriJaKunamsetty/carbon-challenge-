name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (TypeScript)
        run: npm run type-check

      - name: Unit + integration + a11y tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Build (production)
        run: npm run build
        env:
          # Provide stub env vars so Next.js build succeeds without real credentials
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:stub
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-STUB
          NEXT_PUBLIC_APP_CHECK_SITE_KEY: stub
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: stub

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:stub
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-STUB
          NEXT_PUBLIC_APP_CHECK_SITE_KEY: stub
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: stub

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (informational)
        # Allow the audit to report without failing CI.
        # The only known advisory (postcss < 8.5.10, GHSA-qx2v-qp2m-jg93) is a
        # transitive build-time dependency bundled inside Next.js itself.
        # Fixing it would require downgrading Next.js to v9.3.3.
        # See docs/SECURITY.md — "Known Dependency Advisory" for full details.
        run: npm audit --audit-level=critical || true

